services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY}
      AGENTMAIL_EMAIL: ${AGENTMAIL_EMAIL}
      GITHUB_PAT: ${GITHUB_PAT}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PASSWORD: ${GITHUB_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MOLTBOOK_API_KEY: ${MOLTBOOK_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOPPLER_PROJECT: ${DOPPLER_PROJECT}
      DOPPLER_ENVIRONMENT: ${DOPPLER_ENVIRONMENT}
      DOPPLER_CONFIG: ${DOPPLER_CONFIG}
      WALLET_1_ADDRESS: ${WALLET_1_ADDRESS}
      WALLET_1_PKEY: ${WALLET_1_PKEY}
      WALLET_2_ADDRESS: ${WALLET_2_ADDRESS}
      WALLET_2_PKEY: ${WALLET_2_PKEY}
      WALLET_3_ADDRESS: ${WALLET_3_ADDRESS}
      WALLET_3_PKEY: ${WALLET_3_PKEY}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY}
      AGENTMAIL_EMAIL: ${AGENTMAIL_EMAIL}
      GITHUB_PAT: ${GITHUB_PAT}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PASSWORD: ${GITHUB_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MOLTBOOK_API_KEY: ${MOLTBOOK_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOPPLER_PROJECT: ${DOPPLER_PROJECT}
      DOPPLER_ENVIRONMENT: ${DOPPLER_ENVIRONMENT}
      DOPPLER_CONFIG: ${DOPPLER_CONFIG}
      WALLET_1_ADDRESS: ${WALLET_1_ADDRESS}
      WALLET_1_PKEY: ${WALLET_1_PKEY}
      WALLET_2_ADDRESS: ${WALLET_2_ADDRESS}
      WALLET_2_PKEY: ${WALLET_2_PKEY}
      WALLET_3_ADDRESS: ${WALLET_3_ADDRESS}
      WALLET_3_PKEY: ${WALLET_3_PKEY}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
